<!-- Vite HTML entry point. Mounts the React app via src/main.tsx into #root. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale/user-scalable=no disable pinch/double-tap zoom for an app-like feel in the
         installed PWA — tradeoff: also blocks zoom for users who rely on it for readability. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d0e10" />
    <!-- ?v= cache-busts the icon URL so browsers/CDN refetch after the logo changes — Safari in
         particular caches favicons/home-screen icons very aggressively and ignores Cache-Control. -->
    <link rel="icon" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/icon-192.png?v=2" />
    <title>FinanceTracker — Personal Finance Tracker</title>
    <meta
      name="description"
      content="A minimal dark finance tracker for tracking expenses and income."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
