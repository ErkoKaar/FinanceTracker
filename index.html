<!-- Vite HTML entry point. Mounts the React app via src/main.tsx into #root. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale/user-scalable=no disable pinch/double-tap zoom for an app-like feel in the
         installed PWA — tradeoff: also blocks zoom for users who rely on it for readability. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d0e10" />
    <!-- Icon filenames carry a "-v2" suffix (bump it on the next logo change) so browsers/CDNs and
         Safari's favicon cache see a brand-new URL and can't serve stale bytes — Safari in
         particular ignores query-string cache-busting and Cache-Control for favicons. -->
    <link rel="icon" href="/favicon-v2.png" />
    <link rel="apple-touch-icon" href="/icon-192-v2.png" />
    <title>FinanceTracker — Personal Finance Tracker</title>
    <meta
      name="description"
      content="A minimal dark finance tracker for tracking expenses and income."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
